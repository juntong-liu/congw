<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>动物小站 · 小猫档案</title>
  <style>
    :root {
      --bg-top: #fff7d6;
      --bg-mid: #ffd8e5;
      --bg-bottom: #d6f0ff;
      --ink: #2b1f43;
      --muted: #5c4f75;
      --card: #ffffff;
      --accent-a: #ff7aa8;
      --accent-b: #ff9f68;
      --accent-c: #7cd6ff;
      --chip-a: #ffeef5;
      --chip-b: #fff2e8;
      --chip-c: #e9f7ff;
      --radius-xl: 26px;
      --radius-lg: 18px;
      --shadow-soft: 0 14px 40px rgba(61, 32, 90, 0.16);
      --shadow-card: 0 10px 22px rgba(83, 45, 117, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      color: var(--ink);
      font-family: "YouYuan", "STYuanti", "Microsoft YaHei", sans-serif;
      background: linear-gradient(165deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
      overflow-x: hidden;
      position: relative;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      z-index: 0;
      pointer-events: none;
      border-radius: 999px;
      opacity: 0.4;
      filter: blur(1px);
    }

    body::before {
      width: 340px;
      height: 340px;
      right: -90px;
      top: -60px;
      background: radial-gradient(circle at 30% 30%, #ffffff, rgba(255, 255, 255, 0) 68%);
    }

    body::after {
      width: 300px;
      height: 300px;
      left: -70px;
      bottom: -80px;
      background: radial-gradient(circle at 65% 60%, #fff6b8, rgba(255, 246, 184, 0) 65%);
    }

    .card {
      width: min(860px, 100%);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-soft);
      padding: 30px;
      position: relative;
      z-index: 1;
      animation: riseIn 650ms ease-out both;
    }

    .hero {
      display: grid;
      grid-template-columns: 140px 1fr;
      gap: 20px;
      align-items: center;
      margin-bottom: 22px;
    }

    .avatar {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 66px;
      background: radial-gradient(circle at 30% 30%, #fff7cf, #ffd4a8 60%, #ffb7ca);
      box-shadow: inset 0 0 0 6px rgba(255, 255, 255, 0.65), 0 12px 20px rgba(106, 59, 138, 0.2);
      animation: floaty 3.8s ease-in-out infinite;
    }

    .title-wrap h1 {
      margin: 0;
      font-size: clamp(30px, 4.2vw, 44px);
      letter-spacing: 0.5px;
      line-height: 1.1;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: clamp(15px, 2.2vw, 18px);
    }

    .tag {
      margin-top: 12px;
      display: inline-block;
      font-size: 13px;
      color: #6a3b7f;
      background: linear-gradient(90deg, #ffe9f2, #ffeede);
      border: 1px solid #ffd2e4;
      padding: 6px 12px;
      border-radius: 999px;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 8px 0 24px;
    }

    .info-item {
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-card);
      border: 1px solid rgba(255, 255, 255, 0.7);
    }

    .info-item:nth-child(1) { background: var(--chip-a); }
    .info-item:nth-child(2) { background: var(--chip-b); }
    .info-item:nth-child(3) { background: var(--chip-c); }
    .info-item:nth-child(4) { background: #eefbea; }

    .k {
      display: block;
      font-size: 13px;
      color: #7e5c98;
      margin-bottom: 6px;
    }

    .v {
      margin: 0;
      font-size: 17px;
      font-weight: 700;
      color: #2f2146;
      line-height: 1.45;
    }

    .btn {
      border: 0;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      line-height: 1;
      padding: 14px 24px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent-a), var(--accent-b));
      box-shadow: 0 10px 18px rgba(255, 122, 168, 0.35);
      transition: transform 160ms ease, box-shadow 160ms ease, filter 160ms ease;
      user-select: none;
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 14px 24px rgba(255, 122, 168, 0.42);
      filter: saturate(1.05);
    }

    .btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 8px 14px rgba(255, 122, 168, 0.35);
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes floaty {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    @media (max-width: 768px) {
      body { padding: 14px; }

      .card {
        padding: 20px;
        border-radius: 20px;
      }

      .hero {
        grid-template-columns: 1fr;
        text-align: center;
        gap: 12px;
      }

      .avatar {
        width: 106px;
        height: 106px;
        margin: 0 auto;
        font-size: 54px;
      }

      .info-grid {
        grid-template-columns: 1fr;
        gap: 12px;
      }

      .v { font-size: 16px; }

      .btn {
        width: 100%;
        min-height: 48px;
      }
    }
  </style>
</head>
<body>
  <main class="card" aria-label="小猫档案页面">
    <section class="hero">
      <div class="avatar" aria-hidden="true">🐱</div>
      <div class="title-wrap">
        <h1>小猫档案</h1>
        <p class="subtitle">一只会撒娇、爱晒太阳、专注可爱的橘猫</p>
        <div class="tag">卡通可爱风 · 动物主题 HTML</div>
      </div>
    </section>

    <section class="info-grid" aria-label="猫咪信息">
      <article class="info-item">
        <span class="k">名称</span>
        <p class="v">橘猫</p>
      </article>
      <article class="info-item">
        <span class="k">性格</span>
        <p class="v">亲人、黏人、偶尔傲娇</p>
      </article>
      <article class="info-item">
        <span class="k">习惯</span>
        <p class="v">白天打盹，夜晚巡逻</p>
      </article>
      <article class="info-item">
        <span class="k">食物</span>
        <p class="v">猫粮、鸡胸肉、冻干</p>
      </article>
    </section>

    <button class="btn" type="button" onclick="alert('喵~ 今天也要开心！')">打个招呼</button>
  </main>
</body>
</html>
